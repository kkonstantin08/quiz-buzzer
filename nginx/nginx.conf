events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream frontend_server {
        server frontend:80;
    }

    upstream backend_server {
        server backend:3001;
    }

    server {
        listen 80;
        server_name qbuz.ru www.qbuz.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name qbuz.ru www.qbuz.ru;

        ssl_certificate /etc/letsencrypt/live/qbuz.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/qbuz.ru/privkey.pem;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:;" always;

        # WebSocket support for Socket.IO
        location /socket.io/ {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Uploads — allow cross-origin for images
        location /uploads/ {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        # Frontend
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
