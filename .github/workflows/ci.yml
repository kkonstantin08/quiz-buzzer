name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-and-contract:
    name: CI / Install and contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check package-lock.json
        run: git diff --exit-code package-lock.json
      - name: Build shared
        run: npm run build -w packages/shared
      - name: Generate Prisma client
        run: npm run db:generate -w apps/backend
      - name: Validate Prisma schema
        run: npx prisma validate --schema=apps/backend/prisma/schema.prisma
      - name: Check for uncommitted generated files
        run: git diff --exit-code

  backend:
    name: CI / Backend
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-characters
      DATABASE_URL: file:./ci-test.db
      CORS_ORIGIN: http://localhost:5173
      PORT: 0
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Set UPLOAD_DIR
        run: echo "UPLOAD_DIR=$RUNNER_TEMP/quiz-buzzer-uploads" >> $GITHUB_ENV
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w packages/shared
      - name: Generate Prisma client
        run: npm run db:generate -w apps/backend
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
      - name: Build backend
        run: npm run build -w apps/backend
      - name: Typecheck backend
        run: npm run typecheck -w apps/backend
      - name: Run backend tests
        run: npm run test -w apps/backend

  frontend:
    name: CI / Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w packages/shared
      - name: Lint frontend
        run: npm run lint -w apps/frontend
      - name: Typecheck frontend
        run: npm run typecheck -w apps/frontend
      - name: Run frontend tests
        run: npm run test -w apps/frontend
      - name: Build frontend
        run: npm run build -w apps/frontend

  docker-smoke:
    name: CI / Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create safe CI .env
        run: |
          echo "JWT_SECRET=ci-test-jwt-secret-at-least-32-characters" > .env
          echo "CORS_ORIGIN=http://localhost" >> .env
          echo "PORT=3001" >> .env
          echo "DATABASE_URL=file:/app/prisma/dev.db" >> .env
      - name: Build Docker images
        run: docker compose build
      - name: Verify Quick Tunnel is not running
        run: |
          docker compose create
          if docker compose ps -a | grep -q cloudflared; then
            echo "Error: cloudflared should not be running without a profile"
            exit 1
          fi
      - name: Start Docker compose
        run: docker compose up -d
      - name: Wait for backend healthy
        run: |
          echo "Waiting for backend healthcheck..."
          curl --fail --retry 10 --retry-delay 2 http://localhost/api/health
      - name: Verify frontend via nginx
        run: curl -f http://localhost
      - name: Check migrations and seed
        run: |
          logs=$(docker compose logs backend)
          if echo "$logs" | grep -q "Running seed"; then
             echo "Error: Seed should not run automatically"
             exit 1
          fi
      - name: Verify no direct exposed ports
        run: |
          BACKEND_PORTS=$(docker compose port backend 3001 2>/dev/null || true)
          FRONTEND_PORTS=$(docker compose port frontend 80 2>/dev/null || true)
          if [ -n "$BACKEND_PORTS" ] || [ -n "$FRONTEND_PORTS" ]; then
            echo "Error: Backend or frontend is exposing ports directly."
            exit 1
          fi
      - name: Display logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs
      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

  accessibility:
    name: CI / Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w packages/shared
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Accessibility Tests
        run: npx playwright test
        env:
          CI: true
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
