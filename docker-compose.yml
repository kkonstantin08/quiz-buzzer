version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - CORS_ORIGIN=https://qbuz.ru,https://www.qbuz.ru
      - USE_HTTPS=true
      - PORT=3001
      - NODE_ENV=production
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@example.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
    # ports are intentionally NOT exposed — access only through nginx
    volumes:
      - backend_data:/app/prisma

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    # ports are intentionally NOT exposed — access only through nginx
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend



volumes:
  backend_data:
