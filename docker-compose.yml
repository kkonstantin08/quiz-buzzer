version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - PORT=3001
      - NODE_ENV=production
      - TRUST_PROXY=172.30.0.2
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - PAYMENTS_ENABLED=${PAYMENTS_ENABLED:-false}
    # ports are intentionally NOT exposed — access only through nginx
    volumes:
      - backend_data:/app/prisma
      - backend_uploads:/app/uploads
    networks:
      proxy_network:
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    # ports are intentionally NOT exposed — access only through nginx
    depends_on:
      - backend
    networks:
      proxy_network:

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      proxy_network:
        ipv4_address: 172.30.0.2

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - tunnel
    command: tunnel --url http://nginx:80
    restart: unless-stopped
    depends_on:
      - nginx
    networks:
      proxy_network:
        ipv4_address: 172.30.0.3

volumes:
  backend_data:
  backend_uploads:

networks:
  proxy_network:
    ipam:
      config:
        - subnet: 172.30.0.0/24
