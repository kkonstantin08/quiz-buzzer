version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - PORT=3001
      - NODE_ENV=production
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@example.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
    # ports are intentionally NOT exposed — access only through nginx
    volumes:
      - backend_data:/app/prisma

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    # ports are intentionally NOT exposed — access only through nginx
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80" # Exposed on 8080 just in case
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://nginx:80
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  backend_data:
