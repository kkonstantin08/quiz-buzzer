version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: buzzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/buzzer?schema=public
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_for_production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - PORT=3001
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@example.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost/api}
    ports:
      - "5173:80" # direct access to frontend container if needed
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
