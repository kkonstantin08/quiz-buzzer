version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_for_production}
      - CORS_ORIGIN=*
      - PORT=3001
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@example.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/prisma

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "5173:80" # direct access to frontend container if needed
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80" # Exposed on 8080 just in case
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://nginx:80
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  backend_data:
